name: Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages (Direct Upload)
        run: |
          npm install -g wrangler
          CLOUDFLARE_API_KEY=${{ secrets.CLOUDFLARE_API_TOKEN }} CLOUDFLARE_EMAIL=${{ secrets.CLOUDFLARE_EMAIL }} wrangler pages deploy dist --project-name=yishan --commit-dirty=true