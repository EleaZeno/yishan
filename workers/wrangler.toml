name = "yishan-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# D1 Database binding
[[d1_databases]]
binding = "YISHAN_DB"
database_name = "yishan-db"
database_id = "f3cf9afd-8bd1-4fa8-abf4-048d46e3edda"

# KV Namespace binding (for sessions, rate limiting)
[[kv_namespaces]]
binding = "YISHAN_KV"
id = "7bbffa964fd24524a4cd6eea71aab649"

# Environment variables (secrets, set via `wrangler secret put`)
# wrangler secret put YISHAN_JWT_SECRET
# wrangler secret put YISHAN_ADMIN_EMAIL
